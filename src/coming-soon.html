  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-dark:   #1b3055;
      --blue-deep:   #2e5294;
      --blue-mid:    #92addd;
      --blue-light:  #d8e2f3;
      --gold:        #9A7B2F;
      --gold-light:  #C4A44A;
      --red:         #b00a00;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--blue-dark);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .cross {
      width: 72px;
      height: 96px;
      margin-bottom: 2rem;
      filter: drop-shadow(0 2px 12px rgba(0,0,0,0.4));
    }

    h1 {
      font-family: 'Outfit', system-ui, sans-serif;
      font-weight: 700;
      font-size: clamp(1.75rem, 5vw, 3rem);
      letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-family: 'Outfit', system-ui, sans-serif;
      font-weight: 300;
      font-size: clamp(0.95rem, 2.5vw, 1.2rem);
      color: var(--blue-mid);
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 3rem;
      height: 2px;
      background: var(--gold);
      margin: 0 auto 2.5rem;
    }

    p {
      font-size: 1rem;
      line-height: 1.75;
      color: rgba(255,255,255,0.75);
      max-width: 36ch;
      margin-bottom: 0.75rem;
    }

    .contact {
      margin-top: 2.5rem;
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 0.9rem;
      color: var(--blue-mid);
    }

    .contact a {
      color: var(--gold-light);
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }
  </style>
</head>
